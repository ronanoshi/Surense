services:
  mysql:
    image: mysql:8.4
    container_name: surense-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: surense
      MYSQL_USER: surense
      MYSQL_PASSWORD: surense-dev-password
      MYSQL_ROOT_PASSWORD: surense-dev-root
    ports:
      - "3306:3306"
    volumes:
      - surense-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "surense", "-psurense-dev-password"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  app:
    build: .
    container_name: surense-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/surense?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: surense
      SPRING_DATASOURCE_PASSWORD: surense-dev-password
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  surense-mysql-data:
