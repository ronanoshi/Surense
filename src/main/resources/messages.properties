# Customer Support Hub - default (English) message bundle.
# Do NOT embed PII (names, emails, phone numbers) into messages.
# Reference resources by id only; use {0}, {1}, ... for parameter substitution.
#
# To add a language: drop messages_xx.properties (e.g. messages_he.properties)
# next to this file and send Accept-Language: xx on the request.

# 400 - validation / bad request
error.validation.failed=Request validation failed
error.request.malformed=Request body is malformed or missing
error.request.bad=The request is invalid
error.customer.customerLoginNotFound=No user account matches that customer login username
error.customer.customerLoginWrongRole=Linked login must be a user with role CUSTOMER
error.customer.customerLoginAlreadyLinked=That customer login is already linked to another CRM record

# 401 - authentication
error.auth.badCredentials=Invalid username or password
error.auth.invalidToken=The provided authentication token is invalid
error.auth.tokenExpired=The provided authentication token has expired
error.auth.refreshReused=Refresh token reuse detected; the session has been terminated

# 403 - authorization
error.auth.forbidden=You do not have permission to perform this action

# 404 - not found
error.user.notFound=User with id {0} was not found
error.customer.notFound=Customer with id {0} was not found
error.ticket.notFound=Ticket with id {0} was not found
error.resource.notFound=The requested resource was not found

# 409 - conflict
error.user.usernameTaken=Username is already taken
error.user.emailTaken=Email is already in use
error.resource.conflict=The request conflicts with existing data

# 429 - rate limiting
error.rate.limited=Too many requests; please try again later

# 501 - not implemented
error.notImplemented=This endpoint is not yet implemented

# 500 - catch-all (kept deliberately generic; never leaks internal detail)
error.internal=An unexpected error occurred
