spring:
  datasource:
    url: "jdbc:h2:mem:surense-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.surense: INFO

# Rate-limit servlet filters off by default in tests — see application.yml and
# BoomControllerRateLimitIntegrationTest for the opt-in suite.
surense:
  rate-limit:
    enabled: false
